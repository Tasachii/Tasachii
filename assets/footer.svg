<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 110" role="img" aria-label="">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="50%" stop-color="#2c5364"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>

  <!-- body below the wave crest -->
  <path d="M0,38 Q150,8 300,38 T600,38 T900,38 T1200,38 T1500,38 T1800,38 L1800,110 L0,110 Z" fill="url(#bgf)">
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -600 0" dur="12s" repeatCount="indefinite"/>
  </path>
  <rect y="60" width="1200" height="50" fill="#1b2a4a" opacity="0"/>
</svg>
